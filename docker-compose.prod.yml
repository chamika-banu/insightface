# Production overrides for the InsightFace service (CPU).
# Merges with docker-compose.yml — only the differences are listed here.
#
# Usage (CPU):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# Usage (GPU):
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml -f docker-compose.prod-gpu.yml up
#
# Set INSIGHTFACE_IMAGE to your registry image before running:
#   export INSIGHTFACE_IMAGE=your-registry/insightface:latest

services:
  insightface:
    image: ${INSIGHTFACE_IMAGE:-insightface:latest}
    environment:
      - ENABLE_SWAGGER=false
    command: python3 -m uvicorn main:app --host 0.0.0.0 --port 8002 --workers 1
