# GPU + Production overlay for the InsightFace service.
# Merges on top of docker-compose.yml + docker-compose.prod.yml.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.prod-gpu.yml up
#
# Or via make:
#   make serve-prod-gpu
#
# Set INSIGHTFACE_IMAGE to your GPU registry image before running:
#   export INSIGHTFACE_IMAGE=your-registry/insightface:gpu-latest
#
# Prerequisites on the host:
#   - NVIDIA GPU drivers installed
#   - NVIDIA Container Toolkit installed

services:
  insightface:
    image: ${INSIGHTFACE_IMAGE:-insightface:gpu-latest}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
