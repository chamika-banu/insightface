services:
  insightface:
    build: .
    ports:
      - "8002:8002"
    volumes:
      - insightface_cache:/root/.insightface
    environment:
      - PYTHONUNBUFFERED=1
      - ENABLE_SWAGGER=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: python3 -m uvicorn main:app --host 0.0.0.0 --port 8002 --reload

volumes:
  insightface_cache:
